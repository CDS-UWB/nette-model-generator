name: Publish to Packagist

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to refresh on Packagist'
        required: false
        default: main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.PACKAGIST_USERNAME }}" ] || [ -z "${{ secrets.PACKAGIST_API_TOKEN }}" ]; then
            echo "Packagist credentials (PACKAGIST_USERNAME / PACKAGIST_API_TOKEN) are required."
            exit 1
          fi

      - name: Determine ref to update
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.ref }}"
            if [ -z "$TARGET" ]; then
              TARGET=main
            fi
          else
            TARGET=${{ github.ref_name }}
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Call Packagist API
        run: |
          REPOSITORY_URL="https://github.com/${{ github.repository }}"
          TARGET_REF=${{ steps.ref.outputs.target }}
          echo "Pinging Packagist for $REPOSITORY_URL (version: $TARGET_REF)"
          curl --fail --retry 5 \
            -X POST \
            -d "repository=$REPOSITORY_URL" \
            -d "version=$TARGET_REF" \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}"
