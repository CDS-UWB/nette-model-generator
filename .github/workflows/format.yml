name: Format

on: [push, pull_request]

jobs:
  tests:
    name: PHP ${{ matrix.php }} format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer install
      - run: composer format-ci
